<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TML · Sistema de Liquidaciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:#1a1a2e;z-index:99999;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:14px;padding:36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.login-logo{font-size:22px;font-weight:800;margin-bottom:4px;color:#1a1a2e}
.login-logo span{color:#e63946}
.login-modulo{font-size:13px;color:#888;margin-bottom:20px}
.login-input{width:100%;border:1.5px solid #dde;border-radius:8px;padding:10px 14px;font-size:15px;text-align:center;letter-spacing:4px;margin-bottom:12px;outline:none}
.login-input:focus{border-color:#e63946}
.login-btn{width:100%;padding:11px;background:#e63946;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:hover{background:#c1121f}
.login-err{color:#e63946;font-size:12px;margin-top:8px;display:none}

/* HEADER */
header{background:#1a1a2e;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #e63946;position:fixed;top:0;left:0;right:0;z-index:100}
.logo{font-size:18px;font-weight:800}.logo span{color:#e63946}
.nav{display:flex;gap:6px}
.nav a{color:#aaa;text-decoration:none;font-size:12px;padding:6px 12px;border-radius:5px;border:1px solid #333;transition:all .15s}
.nav a:hover{color:#fff;border-color:#555}
.nav a.active{color:#fff;background:#e63946;border-color:#e63946}

/* IFRAME MÓDULOS */
#app{position:fixed;top:51px;left:0;right:0;bottom:0}
iframe{width:100%;height:100%;border:none;display:none}
iframe.visible{display:block}
</style>
</head>
<body>

<!-- HEADER -->
<header id="mainHeader">
  <div class="logo" style="display:flex;align-items:center;gap:10px">
    <img src="LOGO.png" alt="Mudanzas TML" style="height:36px;width:auto;display:block;background:#fff;border-radius:6px;padding:3px 8px">
    <span id="moduloLabel" style="font-size:13px;font-weight:400;color:#aaa"></span>
  </div>
  <nav class="nav">
    <a href="?m=ant" id="navAnt">📋 Anticipos</a>
    <a href="?m=ing" id="navIng">📄 Ingresos</a>
    <a href="?m=liq" id="navLiq">🚛 Liquidaciones</a>
    <a href="?m=nom" id="navNom">🧾 Nómina</a>
    <a href="?m=inc" id="navInc">🚨 Incidentes</a>
    <a href="?m=hist" id="navHist">🗂️ Historial</a>
  </nav>
</header>

<!-- IFRAMES -->
<div id="app">
  <iframe id="fr-ant" src="ant.html" title="Anticipos"></iframe>
  <iframe id="fr-ing" src="ing.html" title="Ingresos"></iframe>
  <iframe id="fr-liq" src="liq.html" title="Liquidaciones"></iframe>
  <iframe id="fr-nom" src="nomina.html" title="Nómina"></iframe>
  <iframe id="fr-inc" src="incidentes.html" title="Incidentes"></iframe>
  <iframe id="fr-hist" src="hist.html" title="Historial"></iframe>
</div>

<script>
var NOMBRES = {ant:'· Anticipos', ing:'· Ingresos', liq:'· Liquidaciones', nom:'· Nómina', inc:'· Incidentes', hist:'· Historial'};
var mods = ['ant','ing','liq','nom','inc','hist'];

// Sesión: cada módulo pide su propio login/permiso al cargarse en el iframe,
// pero aquí filtramos el menú y elegimos a dónde aterrizar según lo que ya
// sabemos de la sesión guardada (sessionStorage, la llena el login del módulo).
function usuarioSesionRouter(){
  try{return JSON.parse(sessionStorage.getItem('tml_user')||'null');}catch(e){return null;}
}
var _u=usuarioSesionRouter();
var modsPermitidos=mods;
if(_u && !_u.esAdmin){
  modsPermitidos=mods.filter(function(m){return _u.permisos&&_u.permisos[m];});
}

var modActual = (new URLSearchParams(window.location.search).get('m')) || (modsPermitidos[0]||'liq');
if (!NOMBRES[modActual]) modActual = modsPermitidos[0]||'liq';
if(_u && !_u.esAdmin && modsPermitidos.length && modsPermitidos.indexOf(modActual)===-1){
  modActual = modsPermitidos[0];
}

document.getElementById('mainHeader').style.display = 'flex';
document.getElementById('moduloLabel').textContent = NOMBRES[modActual] || '';
mods.forEach(function(m) {
  var el = document.getElementById('nav' + m.charAt(0).toUpperCase() + m.slice(1));
  if (el) {
    el.className = m === modActual ? 'active' : '';
    if(_u && !_u.esAdmin && (!_u.permisos || !_u.permisos[m])) el.style.display = 'none';
  }
});
document.querySelectorAll('#app iframe').forEach(function(fr) {
  fr.classList.remove('visible');
});
var fr = document.getElementById('fr-' + modActual);
if (fr) fr.classList.add('visible');
</script>
</body>
</html>
